{
  "@context": "https://schema.org",

  "serviceType": "Agricultural Financial Assistance",
  "provider": {
    "@type": "GovernmentOrganization",
    "name": "कृषि एवं किसान कल्याण मंत्रालय",
    "parentOrganization": {
      "@type": "GovernmentOrganization",
      "name": "भारत सरकार"
    }
  },
  "areaServed": {
    "@type": "Country",
    "name": "India"
  },
  "audience": {
    "@type": "Audience",
    "audienceType": "भूमिधारक किसान परिवार — संस्थागत भूमिधारक, आयकरदाता व उच्च पदस्थ सरकारी कर्मचारी को छोड़कर"
  },
  "url": "https://sarkariyojnamitra.com/pm-kisan",

    "@type": "ApplyAction",
    "name": "आवेदन करें",
    "target": "https://pmkisan.gov.in"
  }
}
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "PM Kisan योजना में कितने पैसे मिलते हैं?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "PM Kisan योजना के तहत पात्र किसान परिवारों को प्रति वर्ष ₹6,000 की सहायता दी जाती है। यह राशि ₹2,000-₹2,000 की तीन किस्तों में हर 4 महीने पर सीधे बैंक खाते में DBT (Direct Benefit Transfer) के माध्यम से भेजी जाती है।"
      }
    },
    {
      "@type": "Question",
      "name": "PM Kisan की किस्त क्यों नहीं आ रही है?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "किस्त न आने के कई कारण हो सकते हैं: e-KYC पूरा नहीं होना (Aadhaar OTP या biometric), बैंक खाता आधार से लिंक न होना, भूमि रिकॉर्ड में त्रुटि, या आवेदन में गलत जानकारी। pmkisan.gov.in पर 'Beneficiary Status' चेक करें और अपने नज़दीकी CSC या कृषि कार्यालय से संपर्क करें।"
      }
    },
    {
      "@type": "Question",
      "name": "PM Kisan के लिए e-KYC कैसे करें?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "PM Kisan e-KYC दो तरीकों से हो सकती है: (1) pmkisan.gov.in पर OTP-based e-KYC — आधार नंबर डालें, मोबाइल पर OTP आएगा, वेरिफ़ाई करें; (2) नज़दीकी CSC (Common Service Centre) पर जाकर Biometric e-KYC कराएं। e-KYC अनिवार्य है — बिना इसके किस्त नहीं आएगी।"
      }
    },
    {
      "@type": "Question",
      "name": "PM Kisan में ऑनलाइन रजिस्ट्रेशन कैसे करें?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "pmkisan.gov.in पर जाएं → 'New Farmer Registration' पर क्लिक करें → Rural या Urban चुनें → आधार नंबर, मोबाइल नंबर, और राज्य डालें → OTP वेरिफ़ाई करें → बैंक विवरण और ज़मीन के दस्तावेज़ भरें → सबमिट करें। वैकल्पिक रूप से, नज़दीकी CSC या लेखपाल/पटवारी के माध्यम से भी रजिस्ट्रेशन करा सकते हैं।"
      }
    },
    {
      "@type": "Question",
      "name": "PM Kisan योजना के लिए कौन पात्र नहीं है?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "इन श्रेणियों के लोग PM Kisan के लिए पात्र नहीं हैं: संस्थागत भूमिधारक, आयकर दाता (पिछले वर्ष), वर्तमान या पूर्व सांसद/विधायक/मंत्री, केंद्र/राज्य सरकार के वर्तमान या सेवानिवृत्त अधिकारी और कर्मचारी (₹10,000+ मासिक पेंशन वाले), डॉक्टर, इंजीनियर, वकील, CA जैसे पेशेवर जो प्रैक्टिस कर रहे हैं।"
      }
    }
  ]
}
</script>
